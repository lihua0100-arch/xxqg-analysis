name: Disassemble ARM64 by Python
on: [workflow_dispatch]
jobs:
  dump:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Install capstone
        run: pip3 install --break-system-packages capstone
      
      - name: Disassemble key methods
        run: |
          python3 -c "
          from capstone import *
          import struct

          with open('xxqg_original','rb') as f:
              data = f.read()

          md = Cs(CS_ARCH_ARM64, CS_MODE_ARM)
          md.detail = True

          def disasm_range(start, end, label):
              print(f'=== {label} (0x{start:X}-0x{end:X}) ===')
              code = data[start:end]
              for insn in md.disasm(code, 0x100000000 + start):
                  imm_hex = ''
                  if insn.group(CS_GRP_JUMP) or insn.group(CS_GRP_CALL) or insn.group(CS_GRP_BRANCH_RELATIVE):
                      for op in insn.operands:
                          if op.type == ARM64_OP_IMM:
                              target = insn.address + op.imm
                              imm_hex = f' ; ->0x{target:X}'
                  print(f'  0x{insn.address:X}: {insn.bytes.hex(\" \")}  {insn.mnemonic} {insn.op_str}{imm_hex}')
              print()

          disasm_range(0x9BB24, 0x9BCE4, 'tapMainButton:')
          disasm_range(0x1DD98, 0x1E070, 'setHUDEnabled:')
          disasm_range(0x86288, 0x86408, 'setupAndNotifyToggle')
          " > /tmp/out.txt
          cat /tmp/out.txt
      
      - uses: actions/upload-artifact@v4
        with:
          name: disasm
          path: /tmp/out.txt
